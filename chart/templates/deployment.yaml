apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "batmon-ha.fullname" . }}
  labels:
    {{- include "batmon-ha.labels" . | nindent 4 }}
spec:
  replicas: 1
  # Only ever run one replica — BLE devices can't be shared
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "batmon-ha.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "batmon-ha.selectorLabels" . | nindent 8 }}
      annotations:
        # Force pod restart when config changes
        checksum/config: {{ .Values.config | toJson | sha256sum }}
    spec:
      hostNetwork: {{ .Values.hostNetwork }}
      hostPID: {{ .Values.hostPID }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: batmon-ha
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            # Bluetooth requires privileged access ??
            privileged: true
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
          env:
            {{- toYaml .Values.env | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /data/options.json
              subPath: options.json
              readOnly: true
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "batmon-ha.fullname" . }}-config
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
